services:
  registry:
    image: registry:2
    container_name: local-registry
    restart: on-failure
    ports:
      - "5000:5000"
    environment:
      - REGISTRY_PROXY_USERNAME=${DOCKER_USER}
      - REGISTRY_PROXY_PASSWORD=${DOCKER_PASSWORD}
    volumes:
      - ./config:/etc/docker/registry
      - registry_data:/var/lib/registry
    networks:
      - local-registry

volumes:
  registry_data:

networks:
  local-registry:
    name: local-registry
    driver: bridge