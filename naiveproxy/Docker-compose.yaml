services: 
  naiveproxy:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./config:/etc/caddy/
      - ./site:/var/www/html
      - caddy_data:/data
      - caddy_config:/config
    cap_add:
      - NET_ADMIN
    networks:
      - naiveproxy_network  

volumes:
  caddy_data:
  caddy_config:

networks:
  naiveproxy_network:
    driver: bridge